name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_api:
        description: Force API deploy even if nestjs unchanged
        type: boolean
        default: false
      force_web:
        description: Force Flutter web deploy even if flutter unchanged
        type: boolean
        default: false
      force_admin:
        description: Force admin (Vue) rebuild on VPS
        type: boolean
        default: false

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tosuthien-api
  VPS_HOST: 168.144.120.72
  VPS_USER: root
  VPS_REPO: /opt/tosu-thien
  API_BASE_URL: https://api.tosuthien.net/

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      admin: ${{ steps.filter.outputs.admin }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'nestjs/**'
              - 'docker-compose.yml'
              - 'deploy/scripts/ci-deploy-api-on-vps.sh'
              - '.github/workflows/deploy.yml'
            web:
              - 'flutter/**'
              - 'deploy/scripts/ci-deploy-web-on-vps.sh'
              - '.github/workflows/deploy.yml'
            admin:
              - 'vuejs/**'
              - 'docker-compose.yml'
            compose:
              - 'docker-compose.yml'

  deploy-api:
    name: Build & deploy API
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' && inputs.force_api ||
      needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./nestjs
          file: ./nestjs/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy API on VPS
        env:
          API_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ssh -o IdentitiesOnly=yes "${VPS_USER}@${VPS_HOST}" \
            "mkdir -p ${VPS_REPO}/deploy/scripts"
          scp deploy/scripts/ci-deploy-api-on-vps.sh \
            "${VPS_USER}@${VPS_HOST}:${VPS_REPO}/deploy/scripts/ci-deploy-api-on-vps.sh"
          ssh -o IdentitiesOnly=yes "${VPS_USER}@${VPS_HOST}" \
            "chmod +x ${VPS_REPO}/deploy/scripts/ci-deploy-api-on-vps.sh && \
             API_IMAGE='${API_IMAGE}' \
             GHCR_USER='${{ github.actor }}' \
             GHCR_TOKEN='${GHCR_TOKEN}' \
             ${VPS_REPO}/deploy/scripts/ci-deploy-api-on-vps.sh"

  deploy-web:
    name: Build & deploy Flutter web
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' && inputs.force_web ||
      needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build web
        working-directory: flutter
        run: |
          set -euo pipefail
          flutter config --no-analytics
          flutter pub get
          BUILD_ID="${GITHUB_SHA::12}"
          flutter build web \
            --release \
            --build-number "$BUILD_ID" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=APP_BUILD_ID="$BUILD_ID"

      - name: Pack web
        run: |
          tar -C flutter/build/web -czf /tmp/tosuthien-web.tar.gz .

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload & publish on VPS
        run: |
          set -euo pipefail
          scp /tmp/tosuthien-web.tar.gz \
            "${VPS_USER}@${VPS_HOST}:/tmp/tosuthien-web.tar.gz"
          scp deploy/scripts/ci-deploy-web-on-vps.sh \
            "${VPS_USER}@${VPS_HOST}:${VPS_REPO}/deploy/scripts/ci-deploy-web-on-vps.sh"
          ssh -o IdentitiesOnly=yes "${VPS_USER}@${VPS_HOST}" \
            "chmod +x ${VPS_REPO}/deploy/scripts/ci-deploy-web-on-vps.sh && \
             ${VPS_REPO}/deploy/scripts/ci-deploy-web-on-vps.sh"

  deploy-admin:
    name: Rebuild admin on VPS
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' && inputs.force_admin ||
      needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Rebuild admin
        run: |
          set -euo pipefail
          ssh -o IdentitiesOnly=yes "${VPS_USER}@${VPS_HOST}" bash -s <<'EOF'
          set -euo pipefail
          cd /opt/tosu-thien
          git fetch origin main
          git reset --hard origin/main
          docker compose up -d --build --force-recreate admin
          docker compose ps admin
          EOF
