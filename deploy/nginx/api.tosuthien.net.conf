# Backend NestJS — proxy to Docker api (port 8000)
# Domain: https://api.tosuthien.net
# Flutter: API_BASE_URL=https://api.tosuthien.net

server {
    listen 80;
    server_name api.tosuthien.net;

    client_max_body_size 1G;

    # SSE chat — disable gzip/buffering so chunked frames stay intact
    location = /api/rag/chat/stream {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
        # SSE chat stream — do not buffer chunks
        proxy_buffering off;
        proxy_cache off;
    }
}
