# Flutter web app (static files)
# Domains: https://tosuthien.net, https://www.tosuthien.net
# Build: flutter build web --dart-define=API_BASE_URL=https://api.tosuthien.net
# Deploy output to: /opt/tosu-thien/www

server {
    listen 80;
    server_name tosuthien.net www.tosuthien.net;

    root /opt/tosu-thien/www;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Flutter web assets (hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|wasm)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
