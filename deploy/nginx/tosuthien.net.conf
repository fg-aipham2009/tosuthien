# Public portal — https://tosuthien.net
# Build: cd portal && npm ci && npm run build
# Deploy: ONLY portal/dist/ → /opt/tosu-thien/portal-dist/
# (Never use git-tracked portal/ as the web root — git pull would restore Vite source.)
# Flutter app stays at https://app.tosuthien.net → /opt/tosu-thien/www
#
# Note: default nginx mime.types maps `.ts` → video/mp2t (MPEG-TS). If the portal
# root is ever polluted with Vite `/src/*.ts`, browsers reject module scripts with
# "Expected a JavaScript module … MIME type of video/mp2t". Guard against that.

server {
    listen 80;
    server_name tosuthien.net www.tosuthien.net;

    root /opt/tosu-thien/portal-dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Never serve TypeScript / Vue source as static modules (wrong MIME + wrong app).
    location ^~ /src/ {
        return 404;
    }
    location ~* \.(ts|tsx|mts|vue|jsx)$ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    # Explicit JS MIME — never inherit video/mp2t or text/html fallback.
    location ~* \.(?:js|mjs)$ {
        types { }
        default_type application/javascript;
        expires 7d;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public" always;
        try_files $uri =404;
    }
}
