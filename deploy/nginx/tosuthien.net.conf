# Public portal — https://tosuthien.net
# Build: cd portal && npm ci && npm run build
# Deploy: rsync portal/dist/ → /opt/tosu-thien/portal/
# Flutter app stays at https://app.tosuthien.net → /opt/tosu-thien/www

server {
    listen 80;
    server_name tosuthien.net www.tosuthien.net;

    root /opt/tosu-thien/portal;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
