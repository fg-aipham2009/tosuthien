# Flutter web app (static files)
# Domain: https://app.tosuthien.net
# Build: flutter build web --dart-define=API_BASE_URL=https://api.tosuthien.net
# Deploy output to: /opt/tosu-thien/www

server {
    listen 80;
    server_name app.tosuthien.net;

    root /opt/tosu-thien/www;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Always fetch latest app shell files after each deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    location = /main.dart.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # Cache static assets folders.
    location ~* ^/(assets|canvaskit|icons)/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|wasm)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
